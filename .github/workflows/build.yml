name: Build Android APK

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      profile:
        description: 'Build profile (preview = APK, production = AAB)'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production

jobs:
  build:
    name: EAS Build – Android
    runs-on: ubuntu-latest

    steps:
      - name: 🔁 Checkout repository
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Install dependencies
        run: npm ci

      - name: 🔧 Setup Expo & EAS CLI
        run: npm install -g expo-cli eas-cli

      - name: 🏗️ Build APK via EAS
        run: |
          PROFILE="${{ github.event.inputs.profile || 'preview' }}"
          eas build \
            --platform android \
            --profile "$PROFILE" \
            --non-interactive \
            --output ./build/app.apk
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: 📤 Upload APK as artifact
        uses: actions/upload-artifact@v4
        with:
          name: chat-app-${{ github.event.inputs.profile || 'preview' }}-${{ github.run_number }}
          path: ./build/app.apk
          retention-days: 30
          if-no-files-found: warn
